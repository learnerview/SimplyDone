version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # entrypoint.sh parses postgresql:// URLs into SPRING_DATASOURCE_* variables.
      # Do NOT use the jdbc: prefix here; that format is only for the SPRING_DATASOURCE_URL override.
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/simplydone
      - REDIS_URL=redis://redis:6379
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=simplydone
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data:
