spring.datasource.url=jdbc:postgresql://localhost:5432/simplydone
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
logging.level.com.learnerview.simplydone=DEBUG

# Email configuration for development
# For testing without SMTP: Use mock email with console logging
# For Gmail: Set MAIL_USERNAME and MAIL_PASSWORD as app password
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:test@example.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Registration settings for dev
simplydone.registration.app-url=${APP_URL:http://localhost:8080}