# ============================================================
# SimplyDone Priority Job Scheduler - Configuration
# ============================================================

# ============================================================
# Core Application & Server
# ============================================================
spring.application.name=SimplyDone
server.port=${PORT:8080}
server.tomcat.threads.max=200
server.tomcat.connection-timeout=20s
server.tomcat.max-connections=8192

# ============================================================
# Database Configuration
# ============================================================
# Entrypoint parses DATABASE_URL into SPRING_DATASOURCE_URL, _USERNAME, _PASSWORD.
# Fallback to in-memory H2 when no database env vars are provided (local dev).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:simplydone;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
# Allow up to 30s for the DB to become reachable on Render's free tier before failing startup
spring.datasource.hikari.initialization-fail-timeout=30000

# ============================================================
# JPA/Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ============================================================
# Redis Configuration
# ============================================================
# entrypoint.sh parses REDIS_URL and exports SPRING_DATA_REDIS_HOST/PORT/PASSWORD/SSL_ENABLED.
# RedisUrlEnvironmentPostProcessor provides a Java-side backup if the shell script didn't run.
# Fallback values are for local development (standard Redis/Valkey on localhost:6379).
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# ============================================================
# Application Features
# ============================================================
simplydone.scheduler.api.enabled=true
simplydone.scheduler.api.admin-endpoints=true
simplydone.scheduler.api.view-endpoints=true

simplydone.scheduler.rate-limit.requests-per-minute=60
simplydone.scheduler.worker.interval-ms=1000
simplydone.scheduler.worker.max-jobs-per-cycle=5
simplydone.scheduler.redis.key-prefix=simplydone
simplydone.scheduler.queues.high=jobs:high
simplydone.scheduler.queues.low=jobs:low
simplydone.scheduler.stats.executed=stats:executed
simplydone.scheduler.stats.rejected=stats:rejected

# ============================================================
# Retry Configuration
# ============================================================
simplydone.retry.max-attempts=3
simplydone.retry.backoff-multiplier=2.0
simplydone.retry.initial-delay-seconds=5

# ============================================================
# Email Service (SMTP - Gmail)
# ============================================================
simplydone.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# File Upload
# ============================================================
simplydone.upload.directory=${UPLOAD_DIR:${java.io.tmpdir}/simplydone-uploads}
simplydone.upload.max-file-size=52428800
simplydone.upload.retention-minutes=10

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.learnerview.SimplyDone=INFO
logging.level.com.zaxxer.hikari=${LOGGING_LEVEL_HIKARI:INFO}
logging.level.org.springframework.data.redis=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Error Handling & Exception Handling
# ============================================================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# ============================================================
# Jackson Configuration
# ============================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# Actuator & Monitoring
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true
management.health.mail.enabled=${EMAIL_ENABLED:false}

# ============================================================
# System Information
# ============================================================
simplydone.system.name=SimplyDone Priority Job Scheduler
simplydone.system.version=1.0.0
simplydone.system.description=Priority Job Scheduling System with PostgreSQL & Redis
