<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head}" th:with="title='Dead Letter Queue — SimplyDone'" />
<body>
    <th:block th:replace="~{fragments/sidebar}" th:with="active='dlq'" />
    <div class="main">
        <header class="header-strip">
            <h1 class="page-title">Dead Letter Queue</h1>
    <div class="main">
        <header class="header-strip">
            <h1 class="page-title">Dead Letter Queue</h1>
            <p style="color:var(--text-muted); font-size:0.9rem">System repository for terminal failures requiring manual intervention.</p>
        </header>
        <div class="viewport">
            <section class="section">
                <div class="section-header">
                    <h3 class="section-title">Failed Transaction Inventory</h3>
                    <div class="live-toggle" onclick="toggleLive()">
                        <span class="dot dot-xs dot-green"></span>
                        <span id="sse-label" style="font-size:0.75rem">Live Sync Mode</span>
                    </div>
                </div>
                <div class="data-box">
                    <table>
                        <thead>
                            <tr>
                                <th>Job ID</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Merchant ID</th>
                                <th>Failed At</th>
                                <th>Error Trace</th>
                                <th>Governance</th>
                            </tr>
                        </thead>
                        <tbody id="dlq-tbody">
                            <tr><td colspan="7" class="empty">Scanning for failed jobs...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
            </section>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
