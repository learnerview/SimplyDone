<!DOCTYPE html>
<html lang="en" data-theme="light" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>
    <div class="main-layout">
        <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

        <main class="main-content">
            <header class="navbar glass-border-b">
                <div class="breadcrumb">
                    <span class="text-secondary">Reliability</span>
                    <span class="mx-2">/</span>
                    <span class="font-bold">Dead Letter Queue</span>
                </div>
                <div class="header-actions">
                    <button onclick="retryAll()" class="btn btn-primary btn-sm">
                        <i data-lucide="rotate-ccw"></i>
                        <span>Retry All</span>
                    </button>
                    <button onclick="clearDLQ()" class="btn btn-danger btn-sm">
                        <i data-lucide="trash-2"></i>
                        <span>Purge DLQ</span>
                    </button>
                </div>
            </header>

            <div class="p-8">
                <div class="section-header mb-8">
                    <h2>Dead Letter Queue</h2>
                    <p>Recover or purge jobs that have exhausted all retry attempts.</p>
                </div>

                <div class="glass-card">
                    <div class="card-title mb-6">
                        <i data-lucide="alert-octagon"></i>
                        <span>Failed Artifacts</span>
                    </div>

                    <div id="dlqList" class="space-y-4">
                        <!-- Loading State -->
                        <div class="flex items-center justify-center py-12">
                            <i data-lucide="loader-2" class="animate-spin text-brand-500 w-8 h-8"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/modules/api.js}"></script>
    <script th:src="@{/js/modules/theme.js}"></script>
    <script th:src="@{/js/modules/ui.js}"></script>
    <script th:src="@{/js/modules/toast.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            lucide.createIcons();
            loadDLQ();
        });

        async function loadDLQ() {
            const listContainer = document.getElementById('dlqList');

            try {
                const response = await fetch('/api/admin/dead-letter-queue');
                const json = await response.json();
                const jobs = json.data || [];

                if (jobs.length === 0) {
                    listContainer.innerHTML = `
                        <div class="text-center py-12 opacity-50">
                            <i data-lucide="check-circle-2" class="mx-auto mb-2 w-12 h-12"></i>
                            <p>Dead letter queue is empty</p>
                        </div>
                    `;
                } else {
                    listContainer.innerHTML = jobs.map(job => `
                        <div class="glass p-5 rounded-xl border border-white/5 hover:border-brand-500/30 transition-all">
                            <div class="flex items-start justify-between">
                                <div class="flex gap-4">
                                    <div class="w-12 h-12 rounded-lg bg-danger-500/10 flex items-center justify-center text-danger-400">
                                        <i data-lucide="alert-triangle"></i>
                                    </div>
                                    <div>
                                        <div class="font-bold text-lg">${job.jobType}</div>
                                        <div class="text-sm text-secondary font-mono mb-2">${job.id}</div>
                                        <div class="text-xs text-danger-400 font-medium mb-1">
                                            Last Error: ${job.lastError || 'Unknown failure'}
                                        </div>
                                        <div class="text-xs text-tertiary">
                                            Failed at: ${new Date(job.failedAt).toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="retryJob('${job.id}')" class="btn btn-primary btn-icon-sm" title="Retry Job">
                                        <i data-lucide="rotate-ccw"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
                lucide.createIcons();
            } catch (error) {
                UI.showToast('Failed to load DLQ', 'error');
            }
        }

        async function retryJob(jobId) {
            try {
                const res = await fetch(`/api/admin/dead-letter-queue/${jobId}/retry`, { method: 'POST' });
                if (res.ok) {
                    UI.showToast('Job queued for retry', 'success');
                    loadDLQ();
                }
            } catch (e) { UI.showToast('Retry failed', 'error'); }
        }

        async function retryAll() {
            UI.showToast('Bulk retry not yet implemented in backend core', 'warning');
        }

        async function clearDLQ() {
            if (!confirm('Purge all jobs in DLQ?')) return;
            try {
                const res = await fetch('/api/admin/dead-letter-queue', { method: 'DELETE' });
                if (res.ok) {
                    UI.showToast('DLQ purged', 'success');
                    loadDLQ();
                }
            } catch (e) { UI.showToast('Purge failed', 'error'); }
        }
    </script>
</body>

</html>
