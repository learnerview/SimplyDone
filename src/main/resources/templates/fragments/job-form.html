<section th:fragment="job-form" class="glass-card page-enter">
    <form id="submit-job-form" class="space-y-6">
        <div class="card-header-minimal">
            <div class="flex items-center gap-3">
                <div class="icon-box brand">
                    <i data-lucide="plus-circle"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold">New Job Dispatch</h3>
                    <p class="text-xs text-secondary">Configure and queue a new priority task</p>
                </div>
            </div>
        </div>

        <!-- Base Parameters Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
                <label>User Identifier</label>
                <input type="text" id="user-id" class="input-glass" placeholder="e.g. system-admin" required>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="priority" class="input-glass">
                    <option value="HIGH">⚡ High</option>
                    <option value="LOW" selected>🐢 Low</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Job Category</label>
            <select id="job-type" class="input-glass" onchange="UI.toggleJobFields(this.value)">
                <option value="EMAIL_SEND">📧 Email Dispatch</option>
                <option value="DATA_PROCESS">⚙️ Data Processing</option>
                <option value="API_CALL">🌐 API Integration</option>
                <option value="FILE_OPERATION">📁 File System</option>
                <option value="NOTIFICATION">🔔 Push Notification</option>
                <option value="REPORT_GENERATION">📊 Analytical Report</option>
                <option value="CLEANUP">🧹 System Cleanup</option>
            </select>
        </div>

        <div class="form-group">
            <label>Task Description</label>
            <input type="text" id="message" class="input-glass" placeholder="e.g. Process monthly analytics" required>
        </div>

        <!-- Dynamic Parameters Section -->
        <div id="dynamic-params" class="p-4 rounded-xl bg-zinc-900/40 border border-zinc-800/50 space-y-4">
            
            <!-- EMAIL_SEND Fields -->
            <div id="params-EMAIL_SEND" class="job-params-section space-y-4">
                <div class="form-group">
                    <label>Recipient(s)</label>
                    <input type="email" name="to" class="input-glass" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Email Subject</label>
                    <input type="text" name="subject" class="input-glass" placeholder="Job Update">
                </div>
                <div class="form-group">
                    <label>SMTP Credentials (Optional)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="email" name="senderEmail" class="input-glass text-xs" placeholder="Sender Email">
                        <input type="password" name="senderPassword" class="input-glass text-xs" placeholder="App Password">
                    </div>
                </div>
                <div class="form-group">
                    <label>HTML Content</label>
                    <textarea name="body" class="input-glass text-xs h-32" placeholder="<h1>Hello</h1>..."></textarea>
                </div>
            </div>

            <!-- DATA_PROCESS Fields -->
            <div id="params-DATA_PROCESS" class="job-params-section space-y-4 hidden">
                <div class="form-group">
                    <label>Operation</label>
                    <select name="operation" class="input-glass">
                        <option value="AGGREGATE">Aggregate (Sum/Avg)</option>
                        <option value="TRANSFORM">Transform Columns</option>
                        <option value="FILTER">Filter Rows</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" name="inputFile" class="input-glass text-xs" placeholder="Input CSV path">
                    <input type="text" name="outputFile" class="input-glass text-xs" placeholder="Output CSV path">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" name="groupBy" class="input-glass text-xs" placeholder="Group By">
                    <input type="text" name="aggregate" class="input-glass text-xs" placeholder="Target Field">
                    <select name="function" class="input-glass text-xs">
                        <option value="SUM">SUM</option>
                        <option value="AVERAGE">AVG</option>
                        <option value="COUNT">COUNT</option>
                    </select>
                </div>
            </div>

            <!-- API_CALL Fields -->
            <div id="params-API_CALL" class="job-params-section space-y-4 hidden">
                <div class="form-group">
                    <label>Endpoint URL</label>
                    <input type="url" name="url" class="input-glass" placeholder="https://api.example.com/v1">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select name="method" class="input-glass">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                    </select>
                    <input type="number" name="expectedStatus" class="input-glass" value="200">
                </div>
                <div class="form-group">
                    <label>Request JSON (Optional)</label>
                    <textarea name="payload" class="input-glass text-xs h-24" placeholder="{ 'key': 'value' }"></textarea>
                </div>
            </div>

            <!-- FILE_OPERATION Fields -->
            <div id="params-FILE_OPERATION" class="job-params-section space-y-4 hidden">
                <div class="form-group">
                    <label>File Action</label>
                    <select name="operation" class="input-glass">
                        <option value="ZIP">Zip Archives</option>
                        <option value="UNZIP">Unzip Archives</option>
                        <option value="COPY">Copy Files</option>
                        <option value="DELETE">Delete Files</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" name="source" class="input-glass text-xs" placeholder="Source Path">
                    <input type="text" name="target" class="input-glass text-xs" placeholder="Target Path">
                </div>
            </div>

            <!-- NOTIFICATION Fields -->
            <div id="params-NOTIFICATION" class="job-params-section space-y-4 hidden">
                <div class="form-group">
                    <label>Channel Strategy</label>
                    <select name="channel" class="input-glass">
                        <option value="WEBHOOK">Generic Webhook</option>
                        <option value="SLACK">Slack Hook</option>
                        <option value="DISCORD">Discord Bot</option>
                    </select>
                </div>
                <input type="url" name="webhookUrl" class="input-glass text-xs" placeholder="https://webhook.site/...">
                <input type="text" name="title" class="input-glass text-xs" placeholder="Notification Title">
                <textarea name="message" class="input-glass text-xs h-20" placeholder="Content message..."></textarea>
            </div>

            <!-- REPORT_GENERATION Fields -->
            <div id="params-REPORT_GENERATION" class="job-params-section space-y-4 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <select name="format" class="input-glass">
                        <option value="HTML">HTML Ready</option>
                        <option value="CSV">CSV Dump</option>
                        <option value="JSON">Raw JSON</option>
                        <option value="PDF">PDF (Enterprise)</option>
                    </select>
                    <input type="text" name="title" class="input-glass" placeholder="Report Title">
                </div>
                <input type="text" name="outputPath" class="input-glass text-xs" placeholder="/reports/export.html">
                <div class="form-group">
                    <label>Data Payload (JSON Array)</label>
                    <textarea name="data" class="input-glass text-xs h-24" placeholder="[{ 'id': 1, 'res': 'ok' }]"></textarea>
                </div>
            </div>

            <!-- CLEANUP Fields -->
            <div id="params-CLEANUP" class="job-params-section space-y-4 hidden">
                <div class="form-group">
                    <label>Cleanup Policy</label>
                    <select name="operation" class="input-glass">
                        <option value="DELETE_BY_PATTERN">Delete by Pattern (*.log)</option>
                        <option value="PURGE_DIRECTORY">Purge Entire Directory</option>
                        <option value="EXPIRE_FILES">Expire Old Files</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" name="directory" class="input-glass text-xs" placeholder="/var/logs">
                    <input type="text" name="pattern" class="input-glass text-xs" value="*.log">
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-full shadow-lg hover-glow">
            <i data-lucide="zap" class="w-4 h-4"></i>
            <span>Dispatch to Redis</span>
        </button>
    </form>
</section>
