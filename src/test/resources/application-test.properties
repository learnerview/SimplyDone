spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Use a random free port for tests
server.port=0

# Minimal scheduler properties
simplydone.scheduler.api.enabled=true
simplydone.scheduler.api.admin-endpoints=true
simplydone.scheduler.api.view-endpoints=false
simplydone.scheduler.rate-limit.requests-per-minute=5
simplydone.scheduler.worker.interval-ms=1000
simplydone.scheduler.redis.key-prefix=test
simplydone.scheduler.queues.high=test:jobs:high
simplydone.scheduler.queues.low=test:jobs:low
simplydone.scheduler.queues.dead-letter=test:dead_letter:jobs
simplydone.scheduler.stats.executed=test:stats:executed
simplydone.scheduler.stats.rejected=test:stats:rejected

simplydone.retry.max-attempts=3
simplydone.retry.backoff-multiplier=2.0
simplydone.retry.initial-delay-seconds=1

simplydone.email.enabled=false
simplydone.email.api-key=
simplydone.email.from-address=test@example.com

simplydone.enhanced-executor=true
simplydone.enhanced-rate-limiting=true
simplydone.enhanced-retry=true

management.endpoints.web.exposure.include=health
