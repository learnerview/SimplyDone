# Spring Boot Application Configuration
spring.application.name=SimplyDone
server.port=8080

# Redis Configuration - following professional patterns
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Job Scheduler Configuration - fully configurable
simplydone.scheduler.rate-limit.requests-per-minute=10
simplydone.scheduler.worker.interval-ms=1000
simplydone.scheduler.redis.key-prefix=simplydone
simplydone.scheduler.queues.high=jobs:high
simplydone.scheduler.queues.low=jobs:low
simplydone.scheduler.stats.executed=stats:executed
simplydone.scheduler.stats.rejected=stats:rejected

# Retry Configuration
simplydone.retry.max-attempts=3
simplydone.retry.backoff-multiplier=2.0
simplydone.retry.initial-delay-seconds=5

# Logging Configuration - professional logging setup with reduced noise
logging.level.com.learnerview.SimplyDone=INFO
logging.level.org.springframework.data.redis=WARN
logging.level.org.springframework.data.redis.connection=WARN
logging.level.io.lettuce=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Spring Boot Actuator Configuration - Production Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.health.show-details=when-authorized
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Health Check Configuration
management.health.redis.enabled=true
management.health.defaults.enabled=true
